<!DOCTYPE html>
<html>
<head>
    <title>Order Now - Fresh Grocery Shop</title>
</head>
<body>

    <header>
        <h1>Fresh Grocery Shop</h1>

        <hr>

        <nav>
            <a href="index.html">Home</a> |
            <a href="products.html">Products</a> |
            <a href="categories.html">Categories</a> |
            <a href="about.html">About</a> |
            <a href="contact.html">Contact</a> |
            <a href="order.html">Order</a>
        </nav>

        <hr>
    </header>

    <main>

        <h2>Order Form</h2>

        <form>

            <label>Full Name:</label><br>
            <input type="text" placeholder="Enter your name"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Enter your email"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" placeholder="Enter your phone number"><br><br>

            <label>Select Product:</label><br>
            <select>
                <option>Apple</option>
                <option>Banana</option>
                <option>Rice</option>
                <option>Milk</option>
                <option>Bread</option>
            </select>

            <br><br>

            <label>Quantity:</label><br>
            <input type="number" min="1" max="20"><br><br>

            <label>Delivery Address:</label><br>
            <textarea rows="5" cols="40" placeholder="Enter your address"></textarea>

            <br><br>

            <label>Payment Method:</label><br>

            <input type="radio" name="payment">
            Cash on Delivery<br>

            <input type="radio" name="payment">
            UPI<br>

            <input type="radio" name="payment">
            Credit/Debit Card

            <br><br>

            <input type="checkbox">
            I agree to the terms and conditions.

            <br><br>

            <input type="submit" value="Place Order">

            <input type="reset" value="Clear Form">

        </form>

    </main>

    <hr>

    <footer>
        <p>© 2026 Fresh Grocery Shop</p>
        <p>Thank you for shopping with us!</p>
    </footer>

</body>
</html>
